services:
# {{IF NO_TUNNEL}}
  traefik:
    image: traefik:v2.11
    command:
      - "--api=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${PROJECT_NAME}_swe-network"
      # Only discover containers with matching project label (enables multi-project isolation)
      - "--providers.docker.constraints=Label(`swe.project`,`${PROJECT_NAME}`)"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--log.level=WARN"
# {{IF NO_SSL}}
      - "--entrypoints.web.address=:7000"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=60s"
# {{ENDIF}}
# {{IF LETSENCRYPT}}
      # Port 80 for ACME HTTP-01 challenges and HTTP→HTTPS redirect
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
# {{ENDIF}}
# {{IF SSL}}
      - "--entrypoints.websecure.address=:7443"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=60s"
# {{ENDIF}}
      # Preview proxy entrypoints (per-session)
      {{PREVIEW_ENTRYPOINTS}}
      # Agent chat proxy entrypoints (per-session)
      {{AGENT_CHAT_ENTRYPOINTS}}
      # Public proxy entrypoints (per-session, no auth)
      {{PUBLIC_ENTRYPOINTS}}
      # VNC proxy entrypoints (per-session browser view)
      {{VNC_ENTRYPOINTS}}
      # Files proxy entrypoints (per-session md-serve view)
      {{FILES_ENTRYPOINTS}}
# {{IF LETSENCRYPT_PRODUCTION}}
      # Let's Encrypt ACME configuration (production)
      - "--certificatesresolvers.letsencrypt.acme.email={{EMAIL}}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
# {{ENDIF}}
# {{IF LETSENCRYPT_STAGING}}
      # Let's Encrypt ACME configuration (staging - for internal testing)
      - "--certificatesresolvers.letsencrypt.acme.email={{EMAIL}}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
# {{ENDIF}}
    ports:
# {{IF NO_SSL}}
      - "${SWE_PORT:-1977}:7000"
# {{ENDIF}}
# {{IF LETSENCRYPT}}
      # Port 80 for ACME challenges and HTTP redirect
      - "80:80"
# {{ENDIF}}
# {{IF SSL}}
      - "${SWE_PORT:-1977}:7443"
# {{ENDIF}}
      # Preview proxy ports (per-session)
      {{PREVIEW_PORTS}}
      # Agent chat proxy ports (per-session)
      {{AGENT_CHAT_PORTS}}
      # Public proxy ports (per-session, no auth)
      {{PUBLIC_PORTS}}
      # VNC proxy ports (per-session browser view)
      {{VNC_PORTS}}
      # Files proxy ports (per-session md-serve view)
      {{FILES_PORTS}}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro"
# {{IF SELFSIGN}}
      - "${HOME}/.swe-swe/tls:/etc/traefik/tls:ro"
# {{ENDIF}}
# {{IF LETSENCRYPT}}
      - "${HOME}/.swe-swe/acme:/etc/traefik/acme"
# {{ENDIF}}
    labels:
      # Project label for multi-instance isolation
      - "swe.project=${PROJECT_NAME}"
    environment:
      # SWE_PORT is referenced by traefik-dynamic.yml's forwardauth address
      # via {{ env "SWE_PORT" }} so the auth check follows the swe-swe-server bind.
      - SWE_PORT=${SWE_PORT:-1977}
    networks:
      - swe-network
    depends_on:
      - swe-swe
    restart: unless-stopped
# {{ENDIF}}

  swe-swe:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
# {{IF TUNNEL}}
    # Tunnel mode: the supervisor goroutine spawns swe-swe-tunnel as a
    # child process, which dials the tunneld outbound and forwards inbound
    # streams to 127.0.0.1:{port}. The bind is normally 127.0.0.1 only;
    # --tunnel-local-ports widens it to all interfaces so the published
    # host ports below can reach it (Docker publishes to the container's
    # eth0, not its loopback).
    command: ["/usr/local/bin/swe-swe-server", "-working-directory", "/workspace", "-bind", "{{TUNNEL_BIND}}"]
# {{IF TUNNEL_LOCAL_PORTS}}
    # --tunnel-local-ports: publish the in-container listeners on the host's
    # 127.0.0.1 so the machine running 'swe-swe up' can reach them directly
    # (e.g. curl localhost:1977). Host-loopback only -- no exposure beyond
    # the tunnel. Mirrors the non-tunnel port set; the tunnel path is
    # unaffected because swe-swe-tunnel still dials 127.0.0.1 internally.
    ports:
      {{TUNNEL_LOCAL_PORTS}}
# {{ENDIF}}
# {{ENDIF}}
    labels:
      - "swe.project=${PROJECT_NAME}"
# {{IF NO_TUNNEL}}
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.rule=PathPrefix(`/`)"
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.priority=10"
# {{IF SSL}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.entrypoints=websecure"
# {{ENDIF}}
# {{IF SELFSIGN}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.tls=true"
# {{ENDIF}}
# {{IF LETSENCRYPT}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.tls.domains[0].main={{DOMAIN}}"
# {{ENDIF}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.middlewares=forwardauth@file"
      - "traefik.http.routers.${PROJECT_NAME}-swe-swe.service=${PROJECT_NAME}-swe-swe"
      - "traefik.http.services.${PROJECT_NAME}-swe-swe.loadbalancer.server.port=${SWE_PORT:-1977}"
      # Auth login/verify routes — no ForwardAuth (otherwise redirect loop)
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.rule=PathPrefix(`/swe-swe-auth`)"
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.priority=200"
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.middlewares=login-ratelimit@file"
# {{IF SSL}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.entrypoints=websecure"
# {{ENDIF}}
# {{IF SELFSIGN}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.tls=true"
# {{ENDIF}}
# {{IF LETSENCRYPT}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.tls.domains[0].main={{DOMAIN}}"
# {{ENDIF}}
      - "traefik.http.routers.${PROJECT_NAME}-swe-auth.service=${PROJECT_NAME}-swe-swe"
      # Preview proxy routing (per-session)
      {{PREVIEW_ROUTERS}}
      # Agent chat proxy routing (per-session)
      {{AGENT_CHAT_ROUTERS}}
      # Public proxy routing (per-session, no auth)
      {{PUBLIC_ROUTERS}}
      # VNC proxy routing (per-session browser view)
      {{VNC_ROUTERS}}
      # Files proxy routing (per-session md-serve view)
      {{FILES_ROUTERS}}
# {{ENDIF}}
    volumes:
      # Mount project directory to /workspace
      - ${WORKSPACE_DIR:-.}:/workspace
      # Mount worktrees to /worktrees for cleaner agent path separation
      - ${WORKSPACE_DIR:-.}/.swe-swe/worktrees:/worktrees
      # Mount external repos directory for persistence across container rebuilds
      - {{REPOS_DIR}}:/repos
      # Mount persistent home for auth/config storage
      - ./home:/home/app
      # Global-tier 'swe-swe proxy --global' scripts (host home, shared across projects).
      # Sub-mount layered on top of ./home:/home/app so the host's $HOME/.swe-swe/proxy
      # is visible inside the container regardless of which project the daemon ran from.
      - ${HOME}/.swe-swe/proxy:/home/app/.swe-swe/proxy
      # Enterprise certificates (if certs/ directory exists with certificates)
      - ./certs:/swe-swe/certs:ro
# {{IF TUNNEL_CLIENT_CERT}}
      # mTLS client cert for the swe-swe-tunnel subprocess. Bind-mounted
      # read-only from the host path passed to swe-swe init via
      # --tunnel-client-cert. The matching private key is the agent's
      # existing identity.key, so no key is mounted here.
      - {{TUNNEL_CLIENT_CERT}}:/home/app/.swe-swe-tunnel/client.crt:ro
# {{ENDIF}}
# {{IF SELFSIGN}}
      # SSL certificate for download endpoint (self-signed only)
      - ${HOME}/.swe-swe/tls:/etc/traefik/tls:ro
# {{ENDIF}}
      # {{IF DOCKER}}
      # Mount Docker socket for container to run Docker commands on host
      - /var/run/docker.sock:/var/run/docker.sock
      # {{ENDIF}}
      # Tmpfs for file uploads - ensures writable regardless of bind mount permissions
      - type: tmpfs
        target: /workspace/.swe-swe/uploads
        tmpfs:
          size: 100M
          mode: 0777
    working_dir: /workspace
    networks:
      - swe-network
    environment:
      # Internal swe-swe-server bind port. Used by entrypoint.sh to compute
      # SWE_SERVER_PORT for in-container shims, and by swe-swe-server itself
      # when the bind is left to env (resolveListenAddr uses SWE_PORT).
      - SWE_PORT=${SWE_PORT:-1977}
      # Auth password (activates embedded auth middleware)
      - SWE_SWE_PASSWORD=${SWE_SWE_PASSWORD:-changeme}
      # SWE_COOKIE_SECURE is no longer set here: swe-swe-server now derives
      # the cookie Secure flag from X-Forwarded-Proto per request (Traefik
      # sets it to https; direct HTTP hits on the backend -- e.g. LAN access
      # to the bare container port -- correctly get a non-Secure cookie).
      # Pass through API keys from host environment (set as env vars or in .env file)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Enterprise certificates (if configured during swe-swe init)
      - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS:-}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-}
      # App preview proxy target port (for split-pane iframe)
      - SWE_PREVIEW_TARGET_PORT=${SWE_PREVIEW_TARGET_PORT:-3000}
      # Container-internal app port range for preview sessions
      - SWE_PREVIEW_PORTS=${SWE_PREVIEW_PORTS:-3000-3019}
      # Container-internal app port range for agent chat sessions
      - SWE_AGENT_CHAT_PORTS=${SWE_AGENT_CHAT_PORTS:-4000-4019}
      # Container-internal app port range for public (no-auth) sessions
      - SWE_PUBLIC_PORTS=${SWE_PUBLIC_PORTS:-5000-5019}
      # Container-internal port range for Chrome DevTools Protocol (per-session)
      - SWE_CDP_PORTS=${SWE_CDP_PORTS:-6000-6019}
      # Container-internal port range for VNC browser view (per-session)
      - SWE_VNC_PORTS=${SWE_VNC_PORTS:-7000-7019}
      # PaaS-style public port (triggers landing/health server on this port
      # when set and different from SWE_PORT)
      - PORT=${PORT:-}
# {{IF TUNNEL}}
      # Tunnel mode: swe-swe-server supervises the swe-swe-tunnel client
      # child process which dials the tunneld outbound. The bind is
      # 127.0.0.1 only by default; --tunnel-local-ports widens it to all
      # interfaces. The -bind flag in command: takes precedence over this
      # env, but they are kept in sync for clarity.
      # See tasks/2026-04-29-tunnel-subprocess-pivot.md.
      - SWE_BIND={{TUNNEL_BIND}}
      - SWE_TUNNEL_SERVER_URL={{TUNNEL_SERVER_URL}}
      - SWE_TUNNEL_UNIQUE=${SWE_TUNNEL_UNIQUE:-{{TUNNEL_UNIQUE}}}
      - SWE_TUNNEL_IDENTITY_KEY=${SWE_TUNNEL_IDENTITY_KEY:-}
      - SWE_TUNNEL_BIN=${SWE_TUNNEL_BIN:-swe-swe-tunnel}
# {{IF TUNNEL_CLIENT_CERT}}
      # mTLS: point swe-swe-tunnel at the cert mounted into the container
      # above. swe-swe-server forwards this env to the child via the
      # supervisor's ClientCertPath option.
      - SWE_TUNNEL_CLIENT_CERT=/home/app/.swe-swe-tunnel/client.crt
# {{ENDIF}}
# {{ENDIF}}
    restart: unless-stopped

networks:
  swe-network:
    driver: bridge
