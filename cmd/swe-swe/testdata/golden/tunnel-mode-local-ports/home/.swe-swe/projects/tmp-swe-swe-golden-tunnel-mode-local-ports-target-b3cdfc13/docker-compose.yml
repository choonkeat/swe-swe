    labels:
      - "swe.project=${PROJECT_NAME}"
    volumes:
      # Mount project directory to /workspace
      - ${WORKSPACE_DIR:-.}:/workspace
      # Mount worktrees to /worktrees for cleaner agent path separation
      - ${WORKSPACE_DIR:-.}/.swe-swe/worktrees:/worktrees
      # Mount external repos directory for persistence across container rebuilds
      - ${WORKSPACE_DIR:-.}/.swe-swe/repos:/repos
      # Mount persistent home for auth/config storage
      - ./home:/home/app
      # Global-tier 'swe-swe proxy --global' scripts (host home, shared across projects).
      # Sub-mount layered on top of ./home:/home/app so the host's $HOME/.swe-swe/proxy
      # is visible inside the container regardless of which project the daemon ran from.
      - ${HOME}/.swe-swe/proxy:/home/app/.swe-swe/proxy
      # Enterprise certificates (if certs/ directory exists with certificates)
      - ./certs:/swe-swe/certs:ro
      # Tmpfs for file uploads - ensures writable regardless of bind mount permissions
      - type: tmpfs
        target: /workspace/.swe-swe/uploads
        tmpfs:
          size: 100M
          mode: 0777
    working_dir: /workspace
    networks:
      - swe-network
    environment:
      # Internal swe-swe-server bind port. Used by entrypoint.sh to compute
      # SWE_SERVER_PORT for in-container shims, and by swe-swe-server itself
      # when the bind is left to env (resolveListenAddr uses SWE_PORT).
      - SWE_PORT=${SWE_PORT:-1977}
      # Auth password (activates embedded auth middleware)
      - SWE_SWE_PASSWORD=${SWE_SWE_PASSWORD:-changeme}
      # SWE_COOKIE_SECURE is no longer set here: swe-swe-server now derives
      # the cookie Secure flag from X-Forwarded-Proto per request (Traefik
      # sets it to https; direct HTTP hits on the backend -- e.g. LAN access
      # to the bare container port -- correctly get a non-Secure cookie).
      # Pass through API keys from host environment (set as env vars or in .env file)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Enterprise certificates (if configured during swe-swe init)
      - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS:-}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-}
      # App preview proxy target port (for split-pane iframe)
      - SWE_PREVIEW_TARGET_PORT=${SWE_PREVIEW_TARGET_PORT:-3000}
      # Container-internal app port range for preview sessions
      - SWE_PREVIEW_PORTS=${SWE_PREVIEW_PORTS:-3000-3019}
      # Container-internal app port range for agent chat sessions
      - SWE_AGENT_CHAT_PORTS=${SWE_AGENT_CHAT_PORTS:-4000-4019}
      # Container-internal app port range for public (no-auth) sessions
      - SWE_PUBLIC_PORTS=${SWE_PUBLIC_PORTS:-5000-5019}
      # Container-internal port range for Chrome DevTools Protocol (per-session)
      - SWE_CDP_PORTS=${SWE_CDP_PORTS:-6000-6019}
      # Container-internal port range for VNC browser view (per-session)
      - SWE_VNC_PORTS=${SWE_VNC_PORTS:-7000-7019}
      # Agent View backend: local (in-container display stack) | off (hide
      # the tab) | <backend-url> (offload to a swe-swe/browser-backend
      # container, e.g. http://host.docker.internal:9333)
      - SWE_AGENT_VIEW=${SWE_AGENT_VIEW:-local}
      # With a backend URL: set to 1 to reverse-tunnel loopback page traffic
      # over an outbound WebSocket (chromium on the backend hits its own
      # loopback; this box needs no inbound reachability from the backend)
      - SWE_AGENT_VIEW_TUNNEL=${SWE_AGENT_VIEW_TUNNEL:-}
      # Shared secret for the browser-backend allocation API
      - SWE_BROWSER_BACKEND_TOKEN=${SWE_BROWSER_BACKEND_TOKEN:-}
      # PaaS-style public port (triggers landing/health server on this port
      # when set and different from SWE_PORT)
      - PORT=${PORT:-}
      # Tunnel mode: swe-swe-server supervises the swe-swe-tunnel client
      # child process which dials the tunneld outbound. The bind is
      # 127.0.0.1 only by default; --tunnel-local-ports widens it to all
      # interfaces. The -bind flag in command: takes precedence over this
      # env, but they are kept in sync for clarity.
      # See tasks/2026-04-29-tunnel-subprocess-pivot.md.
      - SWE_BIND=:${SWE_PORT:-1977}
      - SWE_TUNNEL_SERVER_URL=https://tunnel.example.com
      - SWE_TUNNEL_UNIQUE=${SWE_TUNNEL_UNIQUE:-}
      - SWE_TUNNEL_IDENTITY_KEY=${SWE_TUNNEL_IDENTITY_KEY:-}
      - SWE_TUNNEL_BIN=${SWE_TUNNEL_BIN:-swe-swe-tunnel}
    restart: unless-stopped

networks:
  swe-network:
    driver: bridge
