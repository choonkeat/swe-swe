description = "Reconcile bundled swe-swe slash commands after an upgrade; flag stale/stray files and ask before cleaning up"

prompt = """
Reconcile this deployment's swe-swe slash commands against what the
currently-installed swe-swe ships, then help the user clean up stale or
stray files -- asking before deleting anything, and offering to salvage
anything that looks intentional.

## Background (how bundled commands are laid out)

`swe-swe init` writes the bundled commands to a canonical store and then
**symlinks** that store into each agent's command directory:

- Canonical store (source of truth after init): `~/.swe-swe/commands/md/swe-swe/` (`.md`) and `~/.swe-swe/commands/toml/swe-swe/` (`.toml`)
- Projections (should each be a symlink to the store):
  - `~/.claude/commands/swe-swe` -> md store
  - `~/.codex/prompts/swe-swe` -> md store
  - `~/.config/opencode/command/swe-swe` -> md store
  - `~/.pi/agent/prompts/swe-swe` -> md store
  - `~/.gemini/commands/swe-swe` -> toml store

A projection that is a **real directory instead of a symlink** is drift from
an older (pre-symlink) install: its contents are frozen and no longer track
upgrades.

## Steps

### 0. Make sure the store reflects the installed version

Tell the user: this command treats the canonical store as the expected set,
so they should have already upgraded the swe-swe binary and re-run
`swe-swe init` (or restarted the stack) so the store is current. If they
have not, offer to stop here.

The EXPECTED set = the filenames present in `~/.swe-swe/commands/md/swe-swe/`
(and the matching `.toml` names in the toml store). Read that directory now
and list the expected command names.

### 1. Check each projection

For each projection path above:

- If it is a **symlink** pointing into the canonical store -> OK, report "in sync".
- If it is a **real directory** -> drift. List its files and classify each:
  - name matches an EXPECTED command -> a stale frozen copy (the symlink would supply the current version) -> **drop candidate**
  - name is NOT in the expected set -> either a removed/renamed bundled command, or a command the user/dev added by hand -> **salvage candidate** (do not assume it is junk)
- If it is **missing** -> note it; suggest re-running `swe-swe init`.

### 2. Check project-level command dirs in the current repo

Scan the current repository's project-level command dirs (e.g.
`.claude/commands/`, `.codex/prompts/`, `.config`/`.opencode` equivalents)
for swe-swe slash commands:

- A file whose name matches an EXPECTED bundled command is a **stale local copy** -- the command is now provided centrally, so the local copy only shadows/duplicates it -> drop candidate (unless the user deliberately customized it).
- A flat/loose file or an unknown name is a **salvage candidate** -- it may be a project-specific command worth keeping or moving into the user's own namespace.

### 3. Present a categorized report and ask the user

Group the findings and show them to the user:

```
IN SYNC      <projections that are correct symlinks>
DROP         <stale frozen copies / duplicates of current bundled commands>
SALVAGE?     <files not in the bundle -- possibly intentional>
DRIFT        <projections that are real dirs and should become symlinks>
```

For each DROP and DRIFT item, ask the user to confirm before changing
anything. For each SALVAGE item, ask whether to keep it, move it elsewhere
(e.g. a project-level dir or the user's own command namespace), or delete it.
**Never delete or relink without explicit confirmation.**

### 4. Apply the approved changes

Only after the user decides:

- DROP: remove the confirmed stale files.
- DRIFT: after salvaging any SALVAGE items the user wanted to keep, replace the real directory with a symlink to the canonical store (or advise re-running `swe-swe init`, which performs the same migration).
- SALVAGE: move/keep as the user chose.

Report exactly what was removed, relinked, moved, and kept.
"""
