function renderList(filter) {
  const ul = document.getElementById('chat-list');
  ul.innerHTML = '';
  let lastDate = null;
  let visible = 0;
  for (const e of MANIFEST) {
    if (filter) {
      const hay = (e.title + ' ' + e.idx + ' ' + e.date).toLowerCase();
      if (!hay.includes(filter)) continue;
    }
    if (e.date !== lastDate) {
      const h = document.createElement('div');
      h.className = 'date-group';
      h.textContent = e.date;
      ul.appendChild(h);
      lastDate = e.date;
    }
    const link = document.createElement('a');
    link.href = '#' + encodeURIComponent(e.md);
    link.className = 'chat-link';
    link.dataset.md = e.md;
    link.innerHTML = `<span class="idx">${e.idx}</span><span class="title">${e.title}</span>`;
    link.addEventListener('click', evt => { evt.preventDefault(); selectChat(e); });
    ul.appendChild(link);
    visible++;
  }
  if (visible === 0) {
    const empty = document.createElement('div');
    empty.className = 'date-group';
    empty.style.color = '#5a5e6e';
    empty.textContent = MANIFEST.length === 0 ? 'No chats yet' : 'No matches';
    ul.appendChild(empty);
  }
}

async function selectChat(entry) {
  document.querySelectorAll('.chat-link').forEach(a => a.classList.toggle('active', a.dataset.md === entry.md));
  document.getElementById('current-meta').textContent = `${entry.date}-${entry.idx} · ${entry.title}`;
  document.title = `${entry.title} · Chat logs`;

  const rawMd = document.getElementById('raw-md-link');
  rawMd.href = entry.md;
  rawMd.hidden = false;

  await viewer.load(entry.md, document.getElementById('chat-pane'));
  history.replaceState(null, '', '#' + encodeURIComponent(entry.md));
}

document.getElementById('filter').addEventListener('input', e => {
  renderList(e.target.value.trim().toLowerCase());
});

window.addEventListener('DOMContentLoaded', () => {
  renderList('');
  const hash = decodeURIComponent(location.hash.slice(1));
  const target = MANIFEST.find(e => e.md === hash) || MANIFEST[0];
  if (target) selectChat(target);
});
